<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — IGIMS ID Card System</title>
<style>
    :root {
        --dark-blue: #002366;
        --card-red: #cc0000;
        --accent-orange: #e05a00;
        --light-blue: #2f8fdb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f0f2f7 0%, #dfe7f5 100%);
        padding: 20px;
    }
    .login-card {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        padding: 32px 30px;
    }
    .login-icon {
        width: 56px; height: 56px; border-radius: 50%;
        background: var(--dark-blue); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; margin: 0 auto 16px;
    }
    h1 {
        font-size: 19px;
        color: var(--dark-blue);
        text-align: center;
        margin-bottom: 4px;
    }
    .subtitle {
        font-size: 12.5px;
        color: #777;
        text-align: center;
        margin-bottom: 24px;
    }
    label {
        display: block;
        font-size: 11.5px;
        font-weight: 700;
        color: #444;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
    .field-group { margin-bottom: 16px; }
    input[type="email"], input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d3d7e0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        background: #fbfbfd;
    }
    input:focus {
        outline: none;
        border-color: var(--light-blue);
        box-shadow: 0 0 0 3px rgba(47,143,219,0.15);
    }
    .login-btn {
        width: 100%;
        padding: 11px;
        background: var(--dark-blue);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 4px;
    }
    .login-btn:hover { background: #001c52; }
    .error-msg {
        background: #fdecea;
        color: var(--card-red);
        font-size: 12.5px;
        font-weight: 700;
        padding: 8px 12px;
        border-radius: 7px;
        margin-bottom: 14px;
        display: none;
    }
    .error-msg.show { display: block; }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 18px;
        font-size: 12.5px;
        color: #777;
        text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    .hint {
        margin-top: 18px;
        font-size: 11px;
        color: #999;
        text-align: center;
        line-height: 1.5;
    }
</style>
</head>
<body>

    <div class="login-card">
        <div class="login-icon">🔒</div>
        <h1>Admin Login</h1>
        <p class="subtitle">IGIMS ID Card Generator — Staff Access Only</p>

        <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>

        <form id="loginForm">
            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" required>
            </div>
            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Log In</button>
        </form>

        <a href="index.html" class="back-link">← Back to Home</a>

        <p class="hint">
            No admin account yet? Create one in your Supabase dashboard under
            <strong>Authentication → Users → Add User</strong> (see README.md).
        </p>
    </div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async e => {
        e.preventDefault();
        errorMsg.classList.remove('show');
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
            errorMsg.textContent = error.message || 'Incorrect email or password. Please try again.';
            errorMsg.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Log In';
        } else {
            window.location.href = 'admin.html';
        }
    });
</script>

</body>
</html>
