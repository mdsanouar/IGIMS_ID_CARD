<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGIMS ID Card System</title>
<style>
    :root {
        --dark-blue: #002366;
        --card-red: #cc0000;
        --accent-orange: #e05a00;
        --light-blue: #2f8fdb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f0f2f7 0%, #dfe7f5 100%);
        padding: 20px;
    }
    .wrap {
        width: 100%;
        max-width: 760px;
        text-align: center;
    }
    .title {
        font-size: 26px;
        font-weight: 800;
        color: var(--dark-blue);
        margin-bottom: 6px;
    }
    .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 34px;
    }
    .cards {
        display: flex;
        gap: 22px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .option-card {
        flex: 1 1 280px;
        max-width: 320px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 26px rgba(0,0,0,0.1);
        padding: 30px 26px;
        text-decoration: none;
        color: inherit;
        display: block;
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .option-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 30px rgba(0,0,0,0.15);
    }
    .option-icon {
        width: 54px; height: 54px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; margin: 0 auto 14px;
        color: #fff;
    }
    .option-card.admin .option-icon { background: var(--dark-blue); }
    .option-card.user .option-icon { background: var(--light-blue); }
    .option-card h2 {
        font-size: 16.5px;
        color: var(--dark-blue);
        margin-bottom: 8px;
    }
    .option-card p {
        font-size: 12.5px;
        color: #777;
        line-height: 1.55;
    }
</style>
</head>
<body>

    <div class="wrap">
        <div class="title">🪪 IGIMS ID Card System</div>
        <p class="subtitle">Choose an option below to continue</p>

        <div class="cards">
            <a href="login.html" class="option-card admin">
                <div class="option-icon">🔒</div>
                <h2>Admin Login</h2>
                <p>Staff access to design, preview, and download employee ID cards (front &amp; back).</p>
            </a>

            <a href="user-form.html" class="option-card user">
                <div class="option-icon">📝</div>
                <h2>Employee: Submit Your Details</h2>
                <p>Fill in your Name, Designation, Department, Blood Group, Mobile No. and Address for your ID card.</p>
            </a>
        </div>
    </div>

</body>
</html>
